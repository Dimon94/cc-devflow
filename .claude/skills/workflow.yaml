# =============================================================================
# CC-DevFlow Workflow Schema v9.1.0 (Roadmap + PDCA)
# =============================================================================
# [PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
# =============================================================================

name: cc-devflow
version: "9.1.0"
description: CC-DevFlow roadmap plus PDCA skill schema

artifacts:
  - id: project_roadmap
    generates: ROADMAP.md
    requires: []
    skill: roadmap
    optional: true
    instruction: |
      在项目尺度定义方向、阶段与优先级。

  - id: project_backlog
    generates: BACKLOG.md
    requires: [project_roadmap]
    skill: roadmap
    optional: true
    instruction: |
      把路线图沉成可进入 req-plan 的 backlog。

  - id: requirement_brainstorm
    generates: devflow/requirements/{REQ}/BRAINSTORM.md
    requires: []
    skill: req-plan
    optional: true
    instruction: |
      澄清目标、约束、成功标准与不做项。

  - id: requirement_design
    generates: devflow/requirements/{REQ}/DESIGN.md
    requires: [requirement_brainstorm]
    skill: req-plan
    optional: true
    instruction: |
      冻结 requirement 方案与范围边界。

  - id: context_package
    generates: devflow/requirements/{REQ}/context-package.md
    requires: []
    skill: req-plan
    optional: true
    instruction: |
      在需要 bootstrap 时补齐桥接上下文。

  - id: requirement_tasks
    generates: devflow/requirements/{REQ}/TASKS.md
    requires: [requirement_design]
    skill: req-plan
    optional: true
    instruction: |
      把设计落成可执行任务表。

  - id: task_manifest
    generates: devflow/requirements/{REQ}/task-manifest.json
    requires: [requirement_tasks]
    skill: req-plan
    instruction: |
      生成执行阶段真相源。

  - id: resume_index
    generates: devflow/intent/{REQ}/resume-index.md
    requires: [task_manifest]
    skill: req-plan
    optional: true
    instruction: |
      写出唯一恢复入口。

  - id: runtime_events
    generates: .harness/runtime/{REQ}/**
    requires: [task_manifest]
    skill: req-do
    glob: true
    optional: true
    instruction: |
      执行任务并写入 checkpoint 与事件流。

  - id: bug_analysis
    generates: devflow/bugs/{BUG}/ANALYSIS.md
    requires: []
    skill: req-do
    optional: true
    instruction: |
      在 bug 场景中记录根因调查。

  - id: bug_plan
    generates: devflow/bugs/{BUG}/PLAN.md
    requires: [bug_analysis]
    skill: req-do
    optional: true
    instruction: |
      在 bug 场景中记录最小修复路径。

  - id: report_card
    generates: devflow/requirements/{REQ}/report-card.json
    requires: [task_manifest]
    skill: req-check
    instruction: |
      运行验收与质量门，产出明确结论。

  - id: pr_brief
    generates: devflow/intent/{REQ}/artifacts/pr-brief.md
    requires: [report_card]
    skill: req-act
    optional: true
    instruction: |
      将通过的结果整理成交付简报。

  - id: release_note
    generates: devflow/requirements/{REQ}/RELEASE_NOTE.md
    requires: [report_card]
    skill: req-act
    optional: true
    instruction: |
      在需要发布时生成收尾说明。

  - id: backlog_feedback
    generates: BACKLOG.md
    requires: [report_card]
    skill: req-act
    optional: true
    instruction: |
      在交付后把 learnings、优先级变化与下一轮入口回写进 backlog。

detection:
  method: file_existence
  fallback: report-card.json
  glob_options:
    ignore:
      - "**/.DS_Store"
      - "**/*.bak"
      - "**/node_modules/**"

skills:
  workflow:
    - id: roadmap
      path: roadmap
      description: 路线图阶段，负责项目中长期规划与优先级。
    - id: req-plan
      path: req-plan
      description: Plan 阶段，负责需求澄清、方案设计与任务拆解。
    - id: req-do
      path: req-do
      description: Do 阶段，负责编码、调试、恢复与回改。
    - id: req-check
      path: req-check
      description: Check 阶段，负责验证、质量门与完成判定。
    - id: req-act
      path: req-act
      description: Act 阶段，负责交付、发布、文档收口与闭环校正。
